name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type publish to continue"
        required: true
        type: string
      create_tag:
        description: "Create and push git tag v<package-version>"
        required: true
        default: true
        type: boolean
      npm_tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - beta
          - next

permissions:
  contents: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Guard owner-only execution
        run: |
          if [ "${{ github.actor }}" != "${{ github.repository_owner }}" ]; then
            echo "Only the repository owner can run this workflow."
            exit 1
          fi

      - name: Guard confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "publish" ]; then
            echo "Input mismatch. Set confirm=publish."
            exit 1
          fi

      - name: Guard main branch only
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Run this workflow from the main branch only."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate package
        run: npm run check

      - name: Resolve package version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}"

      - name: Ensure version is not already published
        run: |
          PKG_VERSION="heyagent@${{ steps.version.outputs.version }}"
          if npm view "${PKG_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${PKG_VERSION} already exists on npm."
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: npm publish --access public --tag "${{ github.event.inputs.npm_tag }}"

      - name: Create and push git tag
        if: ${{ github.event.inputs.create_tag == 'true' }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "release: ${TAG}"
          git push origin "${TAG}"
